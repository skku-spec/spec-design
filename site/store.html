<!DOCTYPE html>
<html lang="ko" data-theme="dark" data-mode="design">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEC Books</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{--bg:#202020;--bg-sidebar:#1a1a1a;--bg-card:#2a2a2a;--text:#c8c8c8;--text-bright:#FCFCF8;--text-dim:#8a8a8a;--text-dimmer:#666;--secondary:#4C4780;--secondary-light:rgba(76,71,128,0.15);--border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.15);--table-stripe:rgba(255,255,255,0.02);--shadow:rgba(0,0,0,0.3)}
[data-theme="light"]{--bg:#FCFCF8;--bg-sidebar:#f5f4f0;--bg-card:#fff;--text:#3a3a3a;--text-bright:#202020;--text-dim:#777;--text-dimmer:#999;--secondary:#4C4780;--secondary-light:rgba(76,71,128,0.08);--border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.12);--table-stripe:rgba(0,0,0,0.02);--shadow:rgba(0,0,0,0.08)}
[data-mode="design"][data-theme="dark"]{--primary:#FF6C0F;--primary-variant:#FF9900;--bg-hover:rgba(255,108,15,0.08);--bg-code:#161616;--quote-bg:rgba(255,108,15,0.06);--table-head:#333;--code-bg:rgba(255,108,15,0.12)}
[data-mode="design"][data-theme="light"]{--primary:#FF6C0F;--primary-variant:#FF9900;--bg-hover:rgba(255,108,15,0.06);--bg-code:#f5f4f0;--quote-bg:rgba(255,108,15,0.05);--table-head:#FF6C0F;--code-bg:rgba(255,108,15,0.08)}
:root{--header-h:64px}
html{scroll-behavior:smooth}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:16px;line-height:160%;letter-spacing:-0.02em;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;min-height:100vh}
a{text-decoration:none;color:inherit}
.hdr{position:sticky;top:0;z-index:30;height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:color-mix(in srgb,var(--bg-sidebar) 90%, transparent);border-bottom:1px solid var(--border);backdrop-filter:blur(10px)}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary-variant));display:grid;place-items:center;font-size:14px;font-weight:800;color:#fff;box-shadow:0 8px 18px color-mix(in srgb,var(--primary) 35%, transparent)}
.brand-txt{font-size:20px;font-weight:800;letter-spacing:-0.03em;color:var(--text-bright)}
.hdr-actions{display:flex;align-items:center;gap:10px}
.btn{height:36px;padding:0 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:8px;cursor:pointer;transition:.2s}
.btn:hover{transform:translateY(-1px);border-color:var(--border-strong)}
.btn.primary{background:linear-gradient(135deg,var(--primary),var(--primary-variant));border:none;color:#fff}
.btn.ghost{background:transparent}
.container{max-width:1200px;margin:0 auto;padding:26px 20px 80px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.tabs{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tab{height:36px;padding:0 14px;border-radius:999px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);font-weight:600;font-size:14px;cursor:pointer;transition:.2s}
.tab.active{background:var(--secondary-light);border-color:color-mix(in srgb,var(--secondary) 45%, var(--border));color:var(--text-bright)}
.tab:hover{color:var(--text-bright)}
.sort{display:flex;align-items:center;gap:8px}
.sort-btn{height:36px;padding:0 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);font-size:14px;font-weight:700;color:var(--text-dim);cursor:pointer}
.sort-btn.active{color:var(--text-bright);border-color:var(--primary);background:var(--secondary-light)}
.meta{margin:8px 2px 18px;color:var(--text-dim);font-size:14px}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.card{position:relative;background:var(--bg-card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 12px 24px var(--shadow);cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;display:flex;flex-direction:column;min-height:340px}
.card:hover{transform:translateY(-4px);border-color:var(--border-strong);box-shadow:0 18px 30px var(--shadow)}
.card.blocked{cursor:default}
.cover{height:160px;position:relative;padding:14px;display:flex;align-items:flex-end}
.cover::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.35),rgba(0,0,0,0));pointer-events:none}
.chip{position:relative;z-index:1;background:rgba(0,0,0,.28);color:#fff;border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(4px);padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700}
.content{padding:14px 14px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
.title{font-size:20px;line-height:1.35;color:var(--text-bright);font-weight:800;letter-spacing:-0.03em}
.desc{font-size:14px;color:var(--text-dim);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.author{margin-top:auto;font-size:13px;color:var(--text-dimmer)}
.heart{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:999px;border:1px solid rgba(255,255,255,.22);background:rgba(0,0,0,.25);backdrop-filter:blur(6px);display:grid;place-items:center;color:#fff;cursor:pointer;z-index:2;font-size:16px;transition:.2s}
.heart.active{background:rgba(255,108,15,.2);border-color:rgba(255,153,0,.65);color:#ffd2b3}
.overlay{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.55);color:#fff;font-size:24px;font-weight:900;letter-spacing:-0.04em;z-index:3}
.empty{padding:40px 16px;border:1px dashed var(--border-strong);border-radius:14px;background:var(--bg-card);text-align:center;color:var(--text-dim)}
.ftr{border-top:1px solid var(--border);padding:18px 20px;color:var(--text-dim);text-align:center;font-size:13px;background:var(--bg-sidebar)}
@media (max-width:1080px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:720px){:root{--header-h:58px}.hdr{padding:0 14px}.brand-txt{font-size:18px}.btn{height:34px;padding:0 12px}.container{padding:16px 14px 64px}.topbar{align-items:flex-start}.grid{grid-template-columns:1fr}.title{font-size:19px}}
</style>
</head>
<body>
<header class="hdr">
  <a class="brand" href="landing.html">
    <div class="logo">SPEC</div>
    <div class="brand-txt">SPEC Books</div>
  </a>
  <div class="hdr-actions">
    <button class="btn ghost" id="themeToggle" type="button">Light</button>
    <a class="btn ghost" href="mypage.html" id="profileBtn">로그인</a>
  </div>
</header>

<main class="container">
  <div class="topbar">
    <div class="tabs" id="categoryTabs"></div>
    <div class="sort">
      <button class="sort-btn active" data-sort="recommended" type="button">추천순</button>
      <button class="sort-btn" data-sort="latest" type="button">최신순</button>
    </div>
  </div>
  <div class="meta" id="metaText"></div>
  <section class="grid" id="bookGrid"></section>
</main>

<footer class="ftr">© 2025 SPEC 4기 디자인팀</footer>

<script>
const SUPABASE_URL='https://mjywaiocicjasefcztqr.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qeXdhaW9jaWNqYXNlZmN6dHFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTA4MDgsImV4cCI6MjA5MDUyNjgwOH0.AXZM9vlv_O8dNcTPFIolgfaZhKnYvYHvzlYUb2Zpd-U';
const supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

const BOOKS=[
  { id:'vibe-coding-claude', title:'Claude Code 입문', desc:'AI 코딩 에이전트 Claude Code의 설치부터 실전 활용까지', author:'SPEC 디자인팀', category:'vibe-coding', coverGradient:'linear-gradient(135deg, #4C4780, #6B63B5)', isNew:true },
  { id:'vibe-coding-prd', title:'PRD 작성법', desc:'AI에게 정확한 지시를 내리는 기획 문서 작성법', author:'SPEC 디자인팀', category:'vibe-coding', coverGradient:'linear-gradient(135deg, #2D5A27, #4CAF50)', isNew:true },
  { id:'vibe-coding-deploy', title:'GitHub + Vercel 배포', desc:'코드를 세상에 공개하는 배포의 모든 것', author:'SPEC 디자인팀', category:'vibe-coding', coverGradient:'linear-gradient(135deg, #1a1a2e, #16213e)', isNew:true },
  { id:'vibe-coding-supabase', title:'Supabase 백엔드 입문', desc:'서버 없이 백엔드를 구축하는 Supabase 가이드', author:'SPEC 디자인팀', category:'vibe-coding', coverGradient:'linear-gradient(135deg, #1a5c2e, #3ECF8E)', isNew:true },
  { id:'ai-basics-intro', title:'AI 시대 생존법', desc:'AI 도구 입문과 프롬프트 엔지니어링 기초', author:'SPEC 디자인팀', category:'ai-basics', coverGradient:'linear-gradient(135deg, #FF6C0F, #FF9900)', isNew:false, comingSoon:true },
  { id:'vibe-design-intro', title:'바이브 디자인 입문', desc:'AI로 실무급 디자인을 만드는 방법', author:'SPEC 디자인팀', category:'vibe-design', coverGradient:'linear-gradient(135deg, #E91E63, #FF5722)', isNew:false, comingSoon:true },
  { id:'vibe-marketing-intro', title:'바이브 마케팅 입문', desc:'AI 기반 SNS 콘텐츠 자동화와 브랜딩', author:'SPEC 디자인팀', category:'vibe-marketing', coverGradient:'linear-gradient(135deg, #00BCD4, #009688)', isNew:false, comingSoon:true }
];

const CATEGORY_LABELS={'ai-basics':'AI 기초','vibe-coding':'바이브코딩','vibe-design':'바이브디자인','vibe-marketing':'바이브마케팅'};
const TABS=[{id:'all',label:'전체'},{id:'ai-basics',label:'AI 기초'},{id:'vibe-coding',label:'바이브코딩'},{id:'vibe-design',label:'바이브디자인'},{id:'vibe-marketing',label:'바이브마케팅'}];
let currentCategory='all';
let currentSort='recommended';
let currentUser=null;
let bookmarked=new Set();

const categoryTabs=document.getElementById('categoryTabs');
const grid=document.getElementById('bookGrid');
const metaText=document.getElementById('metaText');
const profileBtn=document.getElementById('profileBtn');
const themeToggle=document.getElementById('themeToggle');

function setTheme(theme){
  document.documentElement.setAttribute('data-theme',theme);
  themeToggle.textContent=theme==='dark'?'Light':'Dark';
  localStorage.setItem('spec-theme',theme);
}

function initTheme(){
  const saved=localStorage.getItem('spec-theme');
  setTheme(saved==='light'?'light':'dark');
}

function sortedBooks(list){
  if(currentSort==='latest'){
    return [...list].sort((a,b)=>Number(b.isNew)-Number(a.isNew)||a.title.localeCompare(b.title,'ko'));
  }
  return [...list].sort((a,b)=>Number(a.comingSoon)-Number(b.comingSoon));
}

function filteredBooks(){
  const byCategory=currentCategory==='all'?BOOKS:BOOKS.filter(b=>b.category===currentCategory);
  return sortedBooks(byCategory);
}

function renderTabs(){
  categoryTabs.innerHTML='';
  TABS.forEach(tab=>{
    const btn=document.createElement('button');
    btn.type='button';
    btn.className=`tab ${tab.id===currentCategory?'active':''}`;
    btn.textContent=tab.label;
    btn.addEventListener('click',()=>{currentCategory=tab.id;render();});
    categoryTabs.appendChild(btn);
  });
}

function makeCard(book){
  const article=document.createElement('article');
  article.className=`card ${book.comingSoon?'blocked':''}`;
  const heart=document.createElement('button');
  heart.type='button';
  heart.className=`heart ${bookmarked.has(book.id)?'active':''}`;
  heart.textContent=bookmarked.has(book.id)?'♥':'♡';
  heart.addEventListener('click',async e=>{
    e.stopPropagation();
    if(book.comingSoon) return;
    if(!currentUser){window.location.href='mypage.html';return;}
    const active=bookmarked.has(book.id);
    if(active){
      const {error}=await supabase.from('bookmarks').delete().eq('user_id',currentUser.id).eq('book_id',book.id);
      if(!error) bookmarked.delete(book.id);
    }else{
      const {error}=await supabase.from('bookmarks').insert({user_id:currentUser.id,book_id:book.id});
      if(!error) bookmarked.add(book.id);
    }
    render();
  });

  const cover=document.createElement('div');
  cover.className='cover';
  cover.style.background=book.coverGradient;
  const chip=document.createElement('span');
  chip.className='chip';
  chip.textContent=CATEGORY_LABELS[book.category]||book.category;
  cover.appendChild(chip);

  const content=document.createElement('div');
  content.className='content';
  const title=document.createElement('h3');
  title.className='title';
  title.textContent=book.title;
  const desc=document.createElement('p');
  desc.className='desc';
  desc.textContent=book.desc;
  const author=document.createElement('p');
  author.className='author';
  author.textContent=book.author;
  content.append(title,desc,author);

  article.append(heart,cover,content);
  if(book.comingSoon){
    const overlay=document.createElement('div');
    overlay.className='overlay';
    overlay.textContent='준비 중';
    article.appendChild(overlay);
  }else{
    article.addEventListener('click',()=>{window.location.href=`index.html?book=${encodeURIComponent(book.id)}`;});
  }
  return article;
}

function render(){
  renderTabs();
  document.querySelectorAll('.sort-btn').forEach(btn=>{btn.classList.toggle('active',btn.dataset.sort===currentSort);});
  const list=filteredBooks();
  const available=list.filter(b=>!b.comingSoon).length;
  metaText.textContent=`총 ${list.length}권 · 바로 읽기 ${available}권`;
  grid.innerHTML='';
  if(!list.length){
    const empty=document.createElement('div');
    empty.className='empty';
    empty.textContent='선택한 카테고리에 도서가 없습니다.';
    grid.appendChild(empty);
    return;
  }
  list.forEach(book=>{grid.appendChild(makeCard(book));});
}

async function initAuth(){
  const {data:{user}}=await supabase.auth.getUser();
  currentUser=user||null;
  profileBtn.textContent=currentUser?'마이페이지':'로그인';
  if(!currentUser){bookmarked=new Set();return;}
  const {data,error}=await supabase.from('bookmarks').select('book_id').eq('user_id',currentUser.id);
  if(error||!Array.isArray(data)){bookmarked=new Set();return;}
  bookmarked=new Set(data.map(row=>row.book_id));
}

document.querySelectorAll('.sort-btn').forEach(btn=>{btn.addEventListener('click',()=>{currentSort=btn.dataset.sort;render();});});
themeToggle.addEventListener('click',()=>setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'));

initTheme();
initAuth().finally(render);
supabase.auth.onAuthStateChange(async(_,session)=>{
  currentUser=session?.user||null;
  profileBtn.textContent=currentUser?'마이페이지':'로그인';
  if(!currentUser){bookmarked=new Set();render();return;}
  const {data}=await supabase.from('bookmarks').select('book_id').eq('user_id',currentUser.id);
  bookmarked=new Set((data||[]).map(row=>row.book_id));
  render();
});
</script>
</body>
</html>
