<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OWbook</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{--bg:#202020;--bg-soft:#1a1a1a;--bg-card:#2a2a2a;--text:#c8c8c8;--text-bright:#FCFCF8;--text-dim:#8a8a8a;--primary:#FF6C0F;--primary-variant:#FF9900;--secondary:#4C4780;--border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.15);--shadow:0 12px 36px rgba(0,0,0,.28);--search-bg:#262626;--badge-bg:rgba(255,108,15,.13);--badge-text:#ff8d3d;--heart-bg:rgba(0,0,0,.38);--heart-border:rgba(255,255,255,.15);--line:rgba(255,255,255,.08)}
[data-theme="light"]{--bg:#FCFCF8;--bg-soft:#fff;--bg-card:#fff;--text:#3a3a3a;--text-bright:#202020;--text-dim:#777;--primary:#FF6C0F;--primary-variant:#FF9900;--secondary:#4C4780;--border:rgba(0,0,0,.08);--border-strong:rgba(0,0,0,.12);--shadow:0 12px 36px rgba(0,0,0,.08);--search-bg:#f3f2ee;--badge-bg:rgba(255,108,15,.08);--badge-text:#ec6400;--heart-bg:rgba(255,255,255,.88);--heart-border:rgba(0,0,0,.08);--line:rgba(0,0,0,.08)}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
a{text-decoration:none;color:inherit}button,input{font-family:inherit}
.header{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg-soft) 97%, transparent);border-bottom:1px solid var(--line);backdrop-filter:blur(16px)}
.header-inner{max-width:1280px;margin:0 auto;padding:16px 32px;display:flex;align-items:center;gap:20px}
.brand{display:flex;align-items:center;gap:12px;min-width:128px}.brand-mark{width:40px;height:40px;border-radius:10px;border:1px solid var(--border-strong);display:grid;place-items:center;font-size:11px;font-weight:900;color:var(--text-bright);background:linear-gradient(135deg,var(--bg-soft),color-mix(in srgb,var(--bg-soft) 78%, var(--primary) 22%))}.brand-name{font-size:18px;font-weight:800;letter-spacing:-.04em;color:var(--text-bright)}
.search{flex:1;display:flex;justify-content:center}.search-box{position:relative;width:min(100%,340px)}.search-box input{width:100%;height:42px;border-radius:999px;border:1px solid var(--border);background:var(--search-bg);padding:0 18px 0 42px;font-size:15px;color:var(--text-bright);outline:none}.search-box input::placeholder{color:var(--text-dim)}.search-box svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text-dim)}
.header-actions{display:flex;align-items:center;gap:10px}.my-btn,.icon-btn{height:42px;border-radius:999px;border:1px solid var(--border);background:var(--bg-soft);display:inline-flex;align-items:center;justify-content:center;transition:.2s}.my-btn{padding:0 18px;font-size:15px;font-weight:700;color:var(--text-bright)}.icon-btn{width:42px;color:var(--text-dim)}.my-btn:hover,.icon-btn:hover{transform:translateY(-1px);border-color:var(--border-strong)}.icon-btn svg{width:19px;height:19px}
.top-tabs{border-bottom:1px solid var(--line)}.top-tabs-inner{max-width:1280px;margin:0 auto;padding:0 32px;display:flex;align-items:center;gap:28px;overflow:auto}.top-link{position:relative;padding:16px 0;font-size:15px;font-weight:700;color:var(--text-dim);white-space:nowrap;background:none;border:none;outline:none;appearance:none;-webkit-appearance:none;box-shadow:none}.top-link.active{color:#1f2e56;font-weight:800}.top-link.active::after{content:'';position:absolute;left:0;right:0;bottom:0;height:2px;background:#1f2e56}.top-divider{color:var(--text-dim);opacity:.22}
.main{max-width:1280px;margin:0 auto;padding:26px 32px 80px}.sort-row{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:28px}.sort-left{display:flex;align-items:center;gap:14px}.sort-link{font-size:15px;font-weight:700;color:#c4c4c4;background:none;border:none}.sort-link.active{color:#1f2e56}.sort-sep{color:#d5d5d5}.filter-right{font-size:15px;font-weight:700;color:var(--text-dim)}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:34px 28px}.card{cursor:pointer}.thumb{position:relative;aspect-ratio:1.8/1;border-radius:16px;overflow:hidden;border:none;padding:20px;background:linear-gradient(180deg,color-mix(in srgb,var(--bg-soft) 98%, transparent),color-mix(in srgb,var(--bg-soft) 90%, var(--primary) 10%));box-shadow:none}.thumb::after{content:'';position:absolute;left:0;right:0;bottom:0;height:34%;background:linear-gradient(180deg,rgba(255,255,255,0),rgba(255,160,60,.08));pointer-events:none}.thumb-copy{position:absolute;left:20px;top:20px;bottom:14px;z-index:1;max-width:50%;display:flex;flex-direction:column}.thumb-title{font-size:clamp(18px,2vw,27px);font-weight:700;letter-spacing:-.05em;line-height:1.18;color:var(--text-bright);word-break:keep-all}.thumb-sub{margin-top:auto;margin-bottom:2px;font-size:13px;line-height:1.55;color:var(--text-dim);word-break:keep-all}.thumb-circle{position:absolute;right:20px;top:50%;transform:translateY(-50%);width:160px;height:160px;border-radius:50%;opacity:.85}.book-mock{position:absolute;right:100px;top:50%;transform:translate(50%,-50%);width:265px;max-height:105%;object-fit:contain;z-index:1;filter:drop-shadow(0 12px 18px rgba(0,0,0,.16));transition:transform .25s,filter .25s}.card:hover .book-mock{transform:translate(50%,-50%) scale(1.04)}
.heart{position:absolute;right:14px;top:14px;width:38px;height:38px;border-radius:50%;border:1px solid var(--heart-border);background:var(--heart-bg);backdrop-filter:blur(10px);display:grid;place-items:center;z-index:2}.heart svg{width:18px;height:18px}.heart-empty{color:#9aa6d7}.heart-filled{display:none;color:#ff4d5d}.heart.active .heart-empty{display:none}.heart.active .heart-filled{display:block}
.card-info{padding-top:14px}.card-author{font-size:12px;font-weight:400;color:#4a5f96;margin-bottom:8px}.card-title{font-size:20px;font-weight:800;letter-spacing:-.04em;line-height:1.35;color:var(--text-bright);margin-bottom:10px;word-break:keep-all}.price-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:8px}.sale-price{font-size:18px;font-weight:700;letter-spacing:-.03em;color:#5b83ff}.originPrice{font-size:13px;color:var(--text-dim);text-decoration:line-through}.origin-price{font-size:13px;color:var(--text-dim);text-decoration:line-through}.meta-row{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-dim);margin-bottom:12px}.meta-star{font-size:14px;color:#f5b21a}.meta-sep{opacity:.45}.card-bottom{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.badge{font-size:11px;font-weight:700;padding:4px 8px;border-radius:3px;border:1px solid transparent}.ebook-badge{color:#ff6c0f;background:transparent;border-color:#ff6c0f}.cat-badge{color:#2f4f97;background:rgba(47,79,151,.08)}.new-badge{background:#ff5a5a;color:#fff}
.empty-state{grid-column:1/-1;padding:90px 20px;text-align:center;color:var(--text-dim);font-size:15px}.footer{border-top:1px solid var(--line);padding:24px;text-align:center;font-size:13px;color:var(--text-dim)}
@media (max-width:1024px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.search-box{width:280px}.book-mock{width:240px}}
@media (max-width:720px){.header-inner{padding:14px 16px;gap:10px}.brand-name{display:none}.search{display:none}.top-tabs-inner,.main{padding-left:16px;padding-right:16px}.grid{grid-template-columns:1fr;gap:24px}.thumb{aspect-ratio:1.9/1;padding:18px}.thumb-copy{max-width:54%;left:18px;top:18px;bottom:12px}.thumb-title{font-size:31px}.thumb-sub{font-size:12px;margin-bottom:2px}.thumb-circle{width:130px;height:130px;right:40px}.book-mock{width:180px;right:105px}.sort-row{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a class="brand" href="landing.html"><img src="covers/OWbook-logo.png" alt="OWbook" style="width:36px;height:36px;border-radius:50%;object-fit:contain"><div class="brand-name">OWbook</div></a>
    <div class="search"><label class="search-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input id="searchInput" type="text" placeholder="전자책 검색"></label></div>
    <div class="header-actions">
      <a class="my-btn" href="mypage.html">My콘텐츠</a>
      <button class="icon-btn" id="themeToggle" type="button" title="테마 전환"><svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
      <button class="icon-btn" type="button" title="메뉴"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
      <a class="icon-btn" href="login.html" id="profileBtn" title="프로필"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
    </div>
  </div>
</header>
<nav class="top-tabs"><div class="top-tabs-inner" id="categoryTabs"></div></nav>
<main class="main">
  <div class="sort-row">
    <div class="sort-left" id="sortRow"><button class="sort-link active" data-sort="recommended" type="button">추천순</button><span class="sort-sep">|</span><button class="sort-link" data-sort="latest" type="button">최신순</button></div>
    
  </div>
  <section class="grid" id="bookGrid"></section>
</main>
<footer class="footer">&copy; 2026 OWbook</footer>
<script>
const SUPABASE_URL='https://mjywaiocicjasefcztqr.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qeXdhaW9jaWNqYXNlZmN6dHFyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTA4MDgsImV4cCI6MjA5MDUyNjgwOH0.AXZM9vlv_O8dNcTPFIolgfaZhKnYvYHvzlYUb2Zpd-U';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const BOOKS=[
{id:'landing-page',title:'랜딩페이지의 모든 것',desc:'클릭을 전환으로 바꾸는 기술',thumbTitle:'랜딩페이지의\n모든 것',thumbSub:'첫 방문을 전환으로 바꾸는\n랜딩 구조 설계',author:'ownuun',category:'vibe-coding',coverImage:'covers/cover-landing.png',circle:'linear-gradient(135deg,#b8c4e8,#98a8d8)',bgTint:'#c0d0f0',originPrice:'39,000원',salePrice:'무료',isNew:true},
{id:'video-automation',title:'AI 영상 자동화 가이드',desc:'프롬프트 하나로 영상을 만드는 시대',thumbTitle:'AI 영상\n자동화 가이드',thumbSub:'프롬프트 하나로 만드는\n영상 제작 워크플로우',author:'ownuun',category:'ai-basics',coverImage:'covers/cover-video.png',circle:'linear-gradient(135deg,#f0c0a8,#e8a888)',bgTint:'#f5d0c0',originPrice:'49,000원',salePrice:'무료',isNew:true},
{id:'vibe-coding-basics',title:'바이브코딩 기초',desc:'코드 몰라도 웹사이트를 만든다',thumbTitle:'바이브코딩\n기초',thumbSub:'코드 몰라도 웹서비스를\n만드는 감각 익히기',author:'ownuun',category:'vibe-coding',coverImage:'covers/cover-coding.png',circle:'linear-gradient(135deg,#e8a8b0,#de8890)',bgTint:'#f0c0c8',originPrice:'',salePrice:'무료',isNew:true},
{id:'ai-design-basics',title:'AI 디자인 기초',desc:'프롬프트로 만드는 실무급 디자인',thumbTitle:'AI 디자인\n기초',thumbSub:'실무급 비주얼을 만드는\n프롬프트 감각',author:'ownuun',category:'vibe-design',coverImage:'covers/cover-design.png',circle:'linear-gradient(135deg,#c0c0cc,#a8a8b8)',bgTint:'#d8d8e0',originPrice:'',salePrice:'무료',isNew:true},
{id:'spec-system',title:'[필독서] SPEC 디자인팀 시스템',desc:'대학 동아리가 프로처럼 일하는 법',thumbTitle:'[필독서]\nSPEC 디자인팀\n시스템',thumbSub:'대학 동아리를 팀처럼\n운영하는 구조와 습관',author:'SPEC 디자인팀 Lead (ownuun)',category:'ai-basics',coverImage:'covers/cover-system.png',circle:'linear-gradient(135deg,#f0c880,#e5b060)',bgTint:'#f5d0a0',originPrice:'',salePrice:'무료',isNew:true},
{id:'marketing-intro',title:'마케팅 세계로의 초대',desc:'AI로 자동화되는 콘텐츠 마케팅',thumbTitle:'마케팅\n세계로의 초대',thumbSub:'콘텐츠 자동화와\n브랜딩 감각 익히기',author:'ownuun',category:'vibe-marketing',coverImage:'covers/cover-marketing.png',circle:'linear-gradient(135deg,#a8c0e8,#88a8d8)',bgTint:'#c8d8f5',originPrice:'',salePrice:'무료',isNew:true}
];
const CATEGORY_LABELS={'ai-basics':'AI 기초','vibe-coding':'바이브코딩','vibe-design':'바이브디자인','vibe-marketing':'바이브마케팅'};
const TABS=[{id:'all',label:'전자책'},{id:'ai-basics',label:'AI 기초'},{id:'vibe-coding',label:'바이브코딩'},{id:'vibe-design',label:'바이브디자인'},{id:'vibe-marketing',label:'마케팅'}];
let currentCategory='all';
let currentSort='recommended';
let currentUser=null;
let bookmarked=new Set();
let metrics={};
let searchQuery='';
const categoryTabs=document.getElementById('categoryTabs');
const grid=document.getElementById('bookGrid');
const profileBtn=document.getElementById('profileBtn');
const themeToggle=document.getElementById('themeToggle');
const themeIcon=document.getElementById('themeIcon');
const searchInput=document.getElementById('searchInput');
function setTheme(theme){document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('spec-theme',theme);themeIcon.innerHTML=theme==='dark'?'<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>':'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'}
function initTheme(){setTheme(localStorage.getItem('spec-theme')||'light')}
function sortedBooks(list){if(currentSort==='latest'){return [...list].sort((a,b)=>Number(b.isNew)-Number(a.isNew)||a.title.localeCompare(b.title,'ko'))}return [...list]}
function filteredBooks(){let byCategory=currentCategory==='all'?BOOKS:BOOKS.filter(b=>b.category===currentCategory);if(searchQuery){const q=searchQuery.toLowerCase();byCategory=byCategory.filter(b=>b.title.toLowerCase().includes(q)||b.author.toLowerCase().includes(q)||b.desc.toLowerCase().includes(q))}return sortedBooks(byCategory)}
function renderTabs(){categoryTabs.innerHTML='';TABS.forEach((tab)=>{const btn=document.createElement('button');btn.type='button';btn.className='top-link'+(tab.id===currentCategory?' active':'');btn.textContent=tab.label;btn.addEventListener('click',()=>{currentCategory=tab.id;render()});categoryTabs.appendChild(btn)})}
function makeCard(book){const card=document.createElement('article');card.className='card';const thumb=document.createElement('div');thumb.className='thumb';if(book.bgTint){thumb.style.background='linear-gradient(180deg, var(--bg) 0%, '+book.bgTint+'22 50%, '+book.bgTint+'44 100%)';}const copy=document.createElement('div');copy.className='thumb-copy';const thumbTitle=document.createElement('div');thumbTitle.className='thumb-title';thumbTitle.innerHTML=(book.thumbTitle||book.title).replace(/\n/g,'<br>');const thumbSub=document.createElement('div');thumbSub.className='thumb-sub';thumbSub.innerHTML=(book.thumbSub||book.desc||'').replace(/\n/g,'<br>');copy.appendChild(thumbTitle);copy.appendChild(thumbSub);thumb.appendChild(copy);const circle=document.createElement('div');circle.className='thumb-circle';circle.style.background=book.circle;thumb.appendChild(circle);const img=document.createElement('img');img.src=book.coverImage;img.alt=book.title;img.loading='lazy';img.className='book-mock';thumb.appendChild(img);const heart=document.createElement('button');heart.type='button';heart.className='heart'+(bookmarked.has(book.id)?' active':'');heart.innerHTML='<svg class="heart-empty" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><svg class="heart-filled" viewBox="0 0 24 24" fill="currentColor"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';heart.addEventListener('click',async e=>{e.stopPropagation();if(!currentUser){window.location.href='mypage.html';return}const active=bookmarked.has(book.id);if(active){const r=await sb.from('bookmarks').delete().eq('user_id',currentUser.id).eq('book_id',book.id);if(!r.error)bookmarked.delete(book.id)}else{const r=await sb.from('bookmarks').insert({user_id:currentUser.id,book_id:book.id});if(!r.error)bookmarked.add(book.id)}render()});thumb.appendChild(heart);card.appendChild(thumb);const info=document.createElement('div');info.className='card-info';const authorEl=document.createElement('div');authorEl.className='card-author';authorEl.textContent=book.author;const titleEl=document.createElement('h3');titleEl.className='card-title';titleEl.textContent=book.title;const priceRow=document.createElement('div');priceRow.className='price-row';const salePrice=document.createElement('div');salePrice.className='sale-price';salePrice.textContent=book.salePrice;const originPrice=document.createElement('div');originPrice.className='origin-price';originPrice.textContent=book.originPrice;priceRow.appendChild(salePrice);priceRow.appendChild(originPrice);const meta=metrics[book.id]||{views:0,reviews:0};const metaRow=document.createElement('div');metaRow.className='meta-row';metaRow.innerHTML='<span class="meta-star">★</span><span>0</span><span class="meta-sep">|</span><span>열람 '+meta.views+'명</span>';const bottom=document.createElement('div');bottom.className='card-bottom';bottom.innerHTML='<span class="badge ebook-badge">전자책</span><span class="badge cat-badge">'+(CATEGORY_LABELS[book.category]||book.category)+'</span>'+(book.isNew?'<span class="badge new-badge">New</span>':'');info.appendChild(authorEl);info.appendChild(titleEl);info.appendChild(priceRow);info.appendChild(metaRow);info.appendChild(bottom);card.appendChild(info);card.addEventListener('click',()=>{window.location.href='index.html?book='+encodeURIComponent(book.id)});return card}
function render(){renderTabs();document.querySelectorAll('.sort-link').forEach(btn=>btn.classList.toggle('active',btn.dataset.sort===currentSort));const list=filteredBooks();grid.innerHTML='';if(!list.length){const empty=document.createElement('div');empty.className='empty-state';empty.textContent=searchQuery?'검색 결과가 없습니다.':'선택한 카테고리에 도서가 없습니다.';grid.appendChild(empty);return}list.forEach(book=>grid.appendChild(makeCard(book)))}
async function loadMetrics(){metrics={};BOOKS.forEach(book=>{metrics[book.id]={views:0,reviews:0}});try{const progress=await sb.from('reading_progress').select('book_id');if(!progress.error&&Array.isArray(progress.data)){progress.data.forEach(row=>{if(metrics[row.book_id])metrics[row.book_id].views+=1})}}catch(e){}try{const comments=await sb.from('comments').select('chapter_id');if(!comments.error&&Array.isArray(comments.data)){comments.data.forEach(row=>{if(metrics[row.chapter_id])metrics[row.chapter_id].reviews+=1})}}catch(e){}}
async function initAuth(){const r=await sb.auth.getUser();currentUser=r.data.user||null;if(!currentUser){bookmarked=new Set();return}const d=await sb.from('bookmarks').select('book_id').eq('user_id',currentUser.id);if(d.error||!Array.isArray(d.data)){bookmarked=new Set();return}bookmarked=new Set(d.data.map(row=>row.book_id));profileBtn.href='mypage.html'}
document.querySelectorAll('.sort-link').forEach(btn=>btn.addEventListener('click',()=>{currentSort=btn.dataset.sort;render()}));themeToggle.addEventListener('click',()=>setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'));searchInput.addEventListener('input',e=>{searchQuery=e.target.value.trim();render()});initTheme();render();Promise.all([loadMetrics(),initAuth()]).then(render).catch(()=>render());sb.auth.onAuthStateChange(async(_,session)=>{currentUser=session&&session.user?session.user:null;if(!currentUser){bookmarked=new Set();render();return}const d=await sb.from('bookmarks').select('book_id').eq('user_id',currentUser.id);bookmarked=new Set((d.data||[]).map(row=>row.book_id));render()});
</script>
</body>
</html>
